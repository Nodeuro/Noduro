  <body>
    <div class="go_back" onclick="window.location.href='../index.html'"> <i class="bi bi-arrow-left-short big_icon"></i> </div> <!-- add the go-back button div -->
    <div class="reload"> <i class="bi bi-arrow-clockwise big_icon"></i> </div> <!-- add the go-back button div -->
    <div class = info_div>
    <div class="info_button"> <i class="bi bi-info big_icon"></i> </div> <!-- add the go-back button div -->
    <div class = "info_accordion"></div>


    </div>
    <div class="overlay">
      <div class="loading_container">
        <div class="loading_text">Loading...</div>
        <div class="loading_circle"></div>
      </div>
      <video class="overlay_video teacher" autoplay loop>
        <source src = "../fake_data/half_res.mp4" type="video/mp4">
      </video>

    </div>

    <div class="main_div">
      <div class = "video_playbar">
      <div class="timeline_container">
        <div class="timeline_progress"></div>
        <div class ="timeline_clickable"></div>
      </div>
        <button id="play_button" class = "play_pause"><i id = play_button_icon class="bi bi-play-fill big_icon"></i></button>
      </div>
      <div class="video_div">

        <video class="video_element"  id = "instructional_content"autoplay>
          <source type="video/mp4">
        </video>
      </div>

      <div class="camera_div">
        <!-- <canvas class="camera" id="camera" width="1920" height="1080"></canvas> -->
        <video class="input_video"></video>
        <canvas class = "canvas" id = "output_video" width="1920" height="1080"></canvas>
        <canvas class = "canvas" id = "results_overlay" width="1920" height="1080"></canvas>
      </div>

    </div>

    <div class = "bottom_div">
      <div class = "two"><p>Step&nbsp</p><h1 id = "step_counter"> <sup>15</sup>/<sub>36</sub></h1></div>
      <div class = "three"><h1 id = "time_on_step"><sup>6</sup>/<sub>17</sub></h1> <p>&nbsp Sec</p></div>
      <div class = "four"><h1 id = "focus_display">0% Focused</h1></div>
      <div class = "four" id = "fps_div"><h1 id = "fps_display">Video Speed</h1></div>
    </div>

  </body>
